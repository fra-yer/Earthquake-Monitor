name: Validate with hassfest

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
on: 
  push:
  pull_request:
  workflow_dispatch:
  
jobs:
  hassfest:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: "actions/checkout@v4"
      - uses: "home-assistant/actions/hassfest@master"
